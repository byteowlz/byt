# Release config consumed by `byt release` (ADR-0021). This is byt's own config
# and the worked example for every byteowlz repo.
[release]
name = "byt"
lang = "rust"
bins = ["byt"]
# darwin targets so byt ships a macOS binary — the reusable workflow's macOS job
# can then download it instead of `cargo install`-ing byt from source each run
# (the first byt release with these targets bootstraps via cargo install once).
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
# extra defaults to ["LICENSE", "README.md"]; sign defaults to false.
